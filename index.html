<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcule Sorte - Análise Matemática</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Banner Topo (Marca) -->
    <header class="top-banner">
        <img src="banner-topo.jpg" alt="Banner Topo">
    </header>

    <!-- Contador (Canto Superior Direito) -->
    <div class="social-proof-counter">
        <span class="count-number" id="visit-count">19</span>
        <span class="count-text">Cálculos realizados</span>
    </div>

    <!-- Logo (Com transbordamento) -->
    <div class="logo-outer">
        <img src="logo.png" alt="Calcule Sorte" class="logo-highlight">
    </div>

    <!-- Painel Central -->
    <div class="main-panel">
        <header class="main-header">
            <h1 class="main-title">Análise Matemática Mega-Sena</h1>
        </header>

        <main>
            <form id="calc-form">
                <div class="input-group">
                    <label>Nome Completo:</label>
                    <input type="text" id="user-name" required placeholder="Digite seu nome">
                </div>
                <div class="input-group">
                    <label>WhatsApp:</label>
                    <input type="tel" id="user-phone" required placeholder="(11) 99999-9999">
                </div>
                <div class="input-group-row">
                    <div><label>Dia:</label><select id="birth-day" required><option value="">Dia</option></select></div>
                    <div><label>Mês:</label><select id="birth-month" required><option value="">Mês</option></select></div>
                    <div><label>Ano:</label><select id="birth-year" required><option value="">Ano</option></select></div>
                </div>
                <button type="submit" class="btn-calculate">⚡ CALCULAR MINHA SORTE</button>
                <p class="free-notice">Você possui 5 rodadas de análise gratuita.</p>
            </form>

            <!-- Ícones 0002.png tratados via CSS -->
            <div class="features-grid">
                <div class="feature-item"><span class="icon">🍀</span><span>Números</span></div>
                <div class="feature-item"><span class="icon">💰</span><span>Prosperidade</span></div>
                <div class="feature-item"><span class="icon">❤️</span><span>Amor</span></div>
                <div class="feature-item"><span class="icon">🚀</span><span>Sucesso</span></div>
                <div class="feature-item"><span class="icon">📅</span><span>Dia Fav.</span></div>
            </div>
        </main>
    </div>

    <!-- Banner Rodapé (Ação) -->
    <div class="footer-banner">
        <img src="banner-rodape.jpg" alt="Banner Ação">
    </div>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="#">Termos de Uso</a> | <a href="#">Privacidade</a>
        </div>
        <p class="footer-copy">© 2026 CalculeSorte.com.br</p>
        <a href="admin.html" class="admin-stealth-link">⚙️</a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
