<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CalculeSorte - Sistema Inteligente</title>
</head>
<body>
    <div class="container">
        <img src="logo.png" id="logo-principal" alt="CalculeSorte">

        <input type="text" id="nome" placeholder="Seu Nome">
        <input type="text" id="whatsapp" placeholder="WhatsApp">
        <div class="datas">
            <select id="dia"><option value="">Dia</option></select> 
            <select id="mes"><option value="">Mês</option></select> 
            <select id="ano"><option value="">Ano</option></select>
        </div>
        
        <button class="btn-calc" onclick="executarCalculo()">GERAR PROJEÇÃO</button>

        <div id="resultado" style="display:none;">
            <p>Seus Números da Sorte:</p>
            <div id="numeros-sorte"></div>
            <div id="relatorio-concurso"></div>
            <a href="#" onclick="localStorage.clear(); location.reload();" class="btn-rodada">NOVA TENTATIVA</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
