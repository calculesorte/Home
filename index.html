<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcule Sorte - Análise Matemática</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="social-proof-counter">
        <span class="icon-users">👥</span>
        <span class="count-text">Mais de</span>
        <span class="count-number highlight">12.847</span>
        <span class="count-text">cálculos realizados</span>
    </div>

    <div class="logo-outer">
        <img src="logo.png" alt="Calcule Sorte" class="logo-highlight">
    </div>

    <div class="main-panel">
        <header class="main-header">
            <h1 class="main-title">Análise Matemática Mega-Sena <span class="highlight">Probabilidades</span></h1>
            <p class="authority-text">Matemática Pura • Lógica Estatística • Cálculo Baseado em Padrões</p>
        </header>

        <main>
            <form id="calc-form">
                <div class="input-group">
                    <label for="user-name">Nome Completo:</label>
                    <input type="text" id="user-name" required placeholder="Digite seu nome">
                </div>
                <div class="input-group">
                    <label for="user-phone">WhatsApp:</label>
                    <input type="tel" id="user-phone" required placeholder="(11) 99999-9999">
                </div>
                <div class="input-group-row">
                    <div><label>Dia:</label><select id="birth-day" required><option value="">Dia</option></select></div>
                    <div><label>Mês:</label><select id="birth-month" required><option value="">Mês</option></select></div>
                    <div><label>Ano:</label><select id="birth-year" required><option value="">Ano</option></select></div>
                </div>
                <button type="submit" class="btn-glow-blue">⚡ CALCULAR MINHA SORTE</button>
            </form>

            <div class="plans-container">
                <a href="#" class="btn-plan-gold">
                    <span class="icon-crown">👑</span>
                    <span class="plan-title">ASSINAR PLANO BÁSICO</span>
                    <span class="plan-price">R$ 5,00/mês</span>
                </a>
                <a href="#" class="btn-plan-gold featured">
                    <span class="icon-crown">👑</span>
                    <span class="plan-title">ASSINAR PLANO VIP</span>
                    <span class="plan-price">R$ 9,90/mês</span>
                </a>
            </div>
        </main>
    </div>

    <div class="banner-container footer-banner">
        <a id="banner-link-bottom" href="#" target="_blank">
            <img id="banner-img-bottom" src="" alt="">
        </a>
    </div>

    <footer class="site-footer">
        <p class="footer-copy">© 2026 CalculeSorte.com.br</p>
        <a href="#" id="link-admin-footer" class="admin-stealth-link">⚙️</a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
