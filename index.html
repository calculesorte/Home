<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CalculeSorte - Sistema</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Calcule Sorte</h1>
        <input type="text" id="nome" placeholder="Seu nome completo">
        <input type="text" id="whatsapp" placeholder="WhatsApp">
        <div class="data-nascimento">
            <select id="dia"><option value="">Dia</option></select>
            <select id="mes"><option value="">Mês</option></select>
            <select id="ano"><option value="">Ano</option></select>
        </div>
        <button id="btn-calc" onclick="executarCalculo()">CALCULAR MINHA SORTE</button>
        <div id="resultado" style="display:none;"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
