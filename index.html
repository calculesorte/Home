<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calcule Sorte - Transformando Datas em Possibilidades</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header-mistic">
    <div class="logo-container">
      <h1 class="titulo-principal">CALCULE SORTE</h1>
    </div>
  </header>

  <main class="conteudo-principal">
    <section class="painel-calculo">
      <div class="painel-header">🔮 Calcule Agora Mesmo</div>
      <div class="painel-body">
        <input type="text" id="nome" placeholder="Seu nome">
        <input type="text" id="whatsapp" placeholder="WhatsApp">
        <div class="campos-data">
          <select id="dia"><option value="">Dia</option><script>for(let i=1;i<=31;i++) document.write(`<option value="${i}">${i}</option>`);</script></select>
          <select id="mes"><option value="">Mês</option><script>for(let i=1;i<=12;i++) document.write(`<option value="${i}">${i}</option>`);</script></select>
          <select id="ano"><option value="">Ano</option><script>for(let i=2026;i>=1920;i--) document.write(`<option value="${i}">${i}</option>`);</script></select>
        </div>
        <button id="btn-gerar" onclick="gerarCalculoGratis()">⚡ CALCULAR MINHA SORTE</button>
      </div>
    </section>

    <section class="painel-resultado" id="painel-resultado" style="display: none;">
      <div class="painel-header">📊 Perfil Gerado: <span id="nome-perfil">---</span></div>
      <div class="painel-body">
        <div class="status-perfil">
          <div class="status-box">Prosperidade <br>94%</div>
          <div class="status-box">Amor <br>88%</div>
          <div class="status-box">Sucesso <br>91%</div>
        </div>
        <div class="numeros-sorte-container">
          <h3>🔒 Seus Números da Sorte</h3>
          <div class="numeros-reais" id="area-numeros">
            <span class="num-final" id="resultado-final">00 - 00 - 00 - 00 - 00 - 00</span>
          </div>
          <a href="https://mpago.la/1CuW65s" target="_blank">
            <button class="btn-pix" style="margin-top: 20px;">Liberar Revelação Completa (PIX)</button>
          </a>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
