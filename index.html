<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcule Sorte | Análise Matemática</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="banner-topo">
        <img src="banner-topo.jpg" alt="Banner Institucional">
    </header>

    <div class="contador-container">
        <span id="visit-count" class="count-number">19</span>
        <span class="count-text">Cálculos realizados</span>
    </div>

    <div class="logo-area">
        <img src="logo.png" alt="Calcule Sorte" class="logo-img">
    </div>

    <main class="main-panel">
        <h1 class="main-title">Análise Matemática</h1>
        <form id="calc-form">
            <div class="input-box"><input type="text" id="user-name" placeholder="Nome Completo" required></div>
            <div class="input-box"><input type="tel" id="user-phone" placeholder="WhatsApp" required></div>
            <div class="data-row">
                <input type="number" id="day" placeholder="Dia" min="1" max="31" required>
                <input type="number" id="month" placeholder="Mês" min="1" max="12" required>
                <input type="number" id="year" placeholder="Ano" min="1900" max="2026" required>
            </div>
            <button type="submit" class="btn-calc">CALCULAR MINHA SORTE</button>
            <p class="free-text">Você possui 5 rodadas de análise gratuita.</p>
        </form>

        <div class="icons-grid">
            <div>🍀<br>Números</div><div>💰<br>Prosperidade</div><div>❤️<br>Amor</div><div>🚀<br>Sucesso</div><div>📅<br>Dia Fav.</div>
        </div>
    </main>

    <footer class="footer-area">
        <div class="banner-rodape">
            <img src="banner-rodape.jpg" alt="Banner Ação">
        </div>
        <div class="footer-links">
            <a href="#">Termos de Uso</a> | <a href="#">Privacidade</a>
        </div>
        <a href="admin.html" class="admin-link">⚙️</a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
